model:
  name: house_price_model
  best_model: RandomForest
  parameters:
    n_estimators: 200
    max_depth: 15
    min_samples_split: 5
    min_samples_leaf: 2
    random_state: 42
  target_variable: price
  feature_sets:
    rfe:
      - sqft
      - house_age
      - bedrooms
      - bathrooms
      - price_per_sqft
      - bed_bath_ratio
      - location_Suburbs
      - location_Downtown
      - condition_Good
      - condition_Excellent
    rfe_method: RandomForestRegressor
    total_features: 15
    selected_features_count: 10
